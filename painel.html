<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meus Pets - PetSamas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <h1>🐾 Meus Pets</h1>
        <div id="listaPets">Carregando...</div>
        <br>
        <a href="cadastro.html">➕ Cadastrar novo pet</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        async function carregarMeusPets() {
            // Verifica quem está logado
            const { data: { user } } = await banco.auth.getUser();
            
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            // Busca APENAS os pets deste usuário
            const { data: pets, error } = await banco
                .from("pets")
                .select("*")
                .eq("user_id", user.id);

            if (error) {
                document.getElementById("listaPets").innerHTML = "Erro ao carregar.";
                return;
            }

            if (pets.length === 0) {
                document.getElementById("listaPets").innerHTML = "Você ainda não tem pets cadastrados.";
                return;
            }

            let html = "<ul>";
            pets.forEach(pet => {
                html += `<li><strong>${pet.nome_pet}</strong> - <a href='qr-code.html?id=${pet.id}'>Ver QR Code</a> | <a href='cadastro.html?id=${pet.id}'>Editar</a></li>`;
            });
            html += "</ul>";
            document.getElementById("listaPets").innerHTML = html;
        }

        carregarMeusPets();
    </script>
</body>
</html>
