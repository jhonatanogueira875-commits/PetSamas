<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <!-- ==========================================
             FOTO DO PET
        =========================================== -->

        <img
            id="foto1"
            src="assets/images/logo.png"
            alt="Foto do Pet">

        <!-- ==========================================
             NOME
        =========================================== -->

        <h1 id="nomePet">

            Carregando...

        </h1>

        <!-- ==========================================
             STATUS
        =========================================== -->

        <p id="statusPet">

            Procurando meu tutor ❤️

        </p>

        <!-- ==========================================
             MENSAGEM
        =========================================== -->

        <p id="mensagemPet">

            Se você me encontrou, converse com meu tutor.

        </p>

        <br>

        <!-- ==========================================
             TUTOR
        =========================================== -->

        <h3>

            👤 Meu Tutor

        </h3>

        <p id="nomeTutor"></p>

        <br>

        <!-- ==========================================
             CIDADE
        =========================================== -->

        <h3>

            📍 Cidade

        </h3>

        <p id="cidadePet"></p>

        <br>

        <!-- ==========================================
             WHATSAPP
        =========================================== -->

        <a
            id="linkWhatsapp"
            href="#"
            target="_blank">

            <button>

                💬 Conversar com meu tutor

            </button>

        </a>

        <br><br>

        <strong>

            ❤️ Muito obrigado por ajudar!

        </strong>

    </main>

    <script src="js/pet.js"></script>

</body>

</html>
