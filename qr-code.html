<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code do Item - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

    <main class="container">

        <!-- LOGO ATUALIZADA -->
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" id="logo" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">
        
        <div id="bloqueioPagamento" style="display: none; text-align: center; padding: 20px;">
            <h2>📱 Nenhum QR Code Vinculado</h2>
            <p>Este item ainda não possui um QR Code ativo.</p>
            <p>Escaneie um QR Code disponível para realizar a vinculação.</p>
            
            <br>
            <a href="meus-pets.html">
                <button class="btn-samas">← Voltar aos meus itens</button>
            </a>
        </div>

        <div id="conteudoLiberado" style="display: none;">
            <h1>🐾 QR Code</h1>
            <p>Este é o QR Code oficial do seu item.</p>
            <h2 id="nomePet">Carregando...</h2>
            
            <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
            
            <p>📌 Imprima este QR Code ou fixe-o em seu item.</p>
            
            <button onclick="window.print()" class="btn-samas">🖨️ Imprimir QR Code</button>
            <br><br>
            <button id="btnBaixar" class="btn-samas">⬇️ Baixar QR Code</button>
            <br><br>
            <a href="meus-pets.html">
                ⬅️ Voltar aos meus itens
            </a>
            <br><br>
            <a href="cadastro.html">
                ➕ Cadastrar outro item
            </a>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/qr-code.js"></script>
</body>
</html>
