<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Itens - Safe Samas</title>

    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

<main class="container">

    <!-- LOGO ATUALIZADA -->
    <img src="assets/images/escudo.png" 
         alt="Logo Safe Samas" 
         id="logo" 
         style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

    <h1>📦 Itens Cadastrados</h1>

    <p class="subtitulo">
        Pesquise um item utilizando o UUID do usuário,
        nome do responsável ou nome do item.
    </p>

    <br>

    <div id="areaBusca">

        <input
            type="text"
            id="inputBusca"
            placeholder="UUID, responsável ou nome do item">

        <button id="btnBuscar" class="btn-samas">
            🔍 Buscar Itens
        </button>

    </div>

    <br>

    <div id="listaPets">

        <p style="opacity:.7;">
            Nenhuma pesquisa realizada.
        </p>

    </div>

    <br>

    <button onclick="history.back()" class="btn-samas">
        ⬅ Voltar
    </button>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/pets.js"></script>

</body>
</html>
