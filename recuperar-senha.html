<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <!-- LOGO -->
        <img src="assets/images/escudo.png"
             alt="Logo Safe Samas"
             id="logo"
             style="max-width:100px;display:block;margin:0 auto 15px auto;">

        <h1>🔑 Recuperar Senha</h1>

        <p class="subtitulo">
            Informe o e-mail utilizado no seu cadastro.
            Enviaremos um link para redefinir sua senha.
        </p>

        <form id="formRecuperar">

            <label for="email">
                📧 E-mail
            </label>

            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
                required>

            <br><br>

            <button
                type="submit"
                class="btn-samas">

                📩 Enviar recuperação

            </button>

        </form>

        <br>

        <a href="login.html"
           style="color:#2c3e50;font-weight:bold;">
            ← Voltar para o Login
        </a>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/recuperar-senha.js"></script>

</body>

</html>
