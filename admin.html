<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel Administrativo - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <img
            src="assets/images/logo.jpg"
            alt="Logo PetSamas"
            id="logo">

        <h1>

            🛠 Painel Administrativo

        </h1>

        <p class="subtitulo">

            Gerencie os QR Codes cadastrados.

        </p>

        <br>

        <a href="qr-institucional.html">

            <button>

                📢 QR Institucional

            </button>

        </a>

        <br><br>

        <div style="border: 1px solid #ccc; padding: 15px; border-radius: 10px; background-color: #f9f9f9;">
            <h3>🖨 Imprimir Lote</h3>
            <input type="text" id="inputLote" placeholder="Digite o número do lote" style="padding: 8px; width: 60%;">
            <button onclick="irParaImpressao()" style="padding: 8px;">Acessar Lote</button>
        </div>

        <br><br>

        <div id="listaPets">

            Carregando...

        </div>

        <br><br>

        <button onclick="sair()">

            🚪 Sair

        </button>

        <br><br>

        <a href="index.html">

            ← Página Inicial

        </a>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/logout.js"></script>

    <script src="js/admin.js"></script>

</body>

</html>
