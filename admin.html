<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <style>
        .card-dashboard {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 12px;
            background-color: #fcfcfc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: left;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <main class="container">
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" id="logo" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <h1>🛠 Painel Administrativo</h1>

        <p class="subtitulo">
            Bem-vindo ao painel administrativo do Safe Samas.
        </p>

        <div class="card-dashboard">
            <h3>📊 Dashboard</h3>
            <p>📦 QR Disponíveis: <strong id="qrDisponiveis">...</strong></p>
            <p>✅ QR Ativados: <strong id="qrAtivados">...</strong></p>
            <p>🐾 Pets/Itens Cadastrados: <strong id="totalPets">...</strong></p>
            <p>📦 Último Lote: <strong id="ultimoLote">...</strong></p>
        </div>

        <button id="btnLotes" class="btn-samas">📦 Gerenciar Lotes</button>
        <button id="btnGerarOnline" class="btn-samas">🌐 Gerar QR Online</button>
        <button id="btnPesquisar" class="btn-samas">🔍 Pesquisar QR Code</button>
        <button id="btnPets" class="btn-samas">🐾 Gerenciar Pets/Itens</button>
        
        <a href="admin-usuarios.html">
            <button class="btn-samas">👥 Gerenciar Usuários</button>
        </a>
        
        <button onclick="sair()" class="btn-samas btn-danger">🚪 Sair</button>
    </main>

    <div id="modalQR" class="modal">
        <div class="modal-content">
            <h3>✅ QR Online Gerado</h3>
            <p>Código: <strong id="codigoGerado"></strong></p>
            
            <div id="qrcodeGerado"></div>
            
            <input type="text" id="linkGerado" readonly style="margin: 15px 0; text-align: center; width: 100%; padding: 10px;">
            
            <button id="btnCopiarLink" class="btn-samas">📋 Copiar Link</button>
            <button onclick="fecharModalQR()" class="btn-samas" style="background: #666; margin-top: 10px;">Fechar</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
