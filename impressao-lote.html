<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Impressão de Lote - PetSamas</title>

    <link rel="stylesheet"

    <link rel="icon"

</head>

<body>

        =================================================== -->

        <img
