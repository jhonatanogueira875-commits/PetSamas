<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressão de Lote - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <!-- LOGO ATUALIZADA -->
        <img src="assets/images/escudo.png" 
             alt="Logo Safe Samas" 
             id="logo" 
             style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <h1>🖨 Impressão de Lote</h1>

        <p class="subtitulo">
            QR Codes prontos para impressão.
        </p>

        <div id="informacoesLote">
            Carregando lote...
        </div>

        <br>

        <div id="gradeQRCodes">
        </div>

        <br><br>

        <!-- BOTÕES COM CLASSE btn-samas -->
        <button onclick="window.print()" class="btn-samas">
            🖨 Imprimir / Salvar em PDF
        </button>

        <br><br>

        <button onclick="history.back()" class="btn-samas">
            ⬅ Voltar
        </button>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="js/impressao-lote.js"></script>

</body>
</html>
