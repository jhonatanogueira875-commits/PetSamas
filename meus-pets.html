<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Cadastros - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <img src="assets/images/escudo.png" alt="Logo Safe Samas" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <h1 id="tituloPagina">
            🐾/🔑 Meu Espaço
        </h1>

        <p class="subtitulo" id="subtituloPagina">
            Aqui você pode visualizar e gerenciar todos os seus itens e pets.
        </p>

        <br>

        <div id="listaPets" class="card-dashboard">
            Carregando seus cadastros...
        </div>

        <br>

        <a href="cadastro.html" id="botaoNovoPet">
            <button class="btn-samas">
                ➕ Cadastrar Novo Item/Pet
            </button>
        </a>

        <button onclick="sair()" class="btn-samas btn-danger">
            🚪 Sair
        </button>

        <br><br>

        <a href="index.html" style="color: #2c3e50; font-weight: bold;">
            ← Voltar para a Página Inicial
        </a>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/logout.js"></script>
    <script src="js/meus-pets.js"></script>

</body>

</html>
