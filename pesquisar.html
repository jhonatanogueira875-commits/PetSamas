<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisar QR Code - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

    <main class="container">
        <!-- LOGO ATUALIZADA -->
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" id="logo" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">
        
        <h1>🔍 Pesquisar QR Code</h1>
        
        <div class="card-dashboard">
            <h3>Pesquisar</h3>
            <input 
                type="text" 
                id="inputCodigo" 
                placeholder="QR Code, nome, tutor ou telefone">
            
            <button onclick="buscarQRCode()" class="btn-samas">
                🔍 Pesquisar
            </button>
        </div>

        <div id="resultadoPesquisa" style="margin-top: 20px;">
        </div>

        <br>

        <button onclick="history.back()" class="btn-samas">
            ⬅ Voltar
        </button>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/pesquisar.js"></script>
</body>
</html>
