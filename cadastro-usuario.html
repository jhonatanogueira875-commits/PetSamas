<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <!-- LOGO ATUALIZADA -->
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" id="logo" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <h1>Criar Conta</h1>

        <p class="subtitulo">
            Cadastre-se para gerenciar seus itens e pets.
        </p>

        <!-- FORMULÁRIO -->
        <form id="formCadastroUsuario">
            <label for="nome">👤 Nome</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>

            <label for="email">📧 E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <label for="senha">🔒 Senha</label>
            <input type="password" id="senha" placeholder="Crie uma senha" required>

            <label for="confirmarSenha">🔒 Confirmar Senha</label>
            <input type="password" id="confirmarSenha" placeholder="Digite novamente a senha" required>

            <br><br>

            <button type="submit" class="btn-samas">
                👤 Criar Conta
            </button>
        </form>

        <br>

        <p>Já possui uma conta?</p>
        <br>

        <a href="login.html">
            <button class="btn-samas">
                🔐 Entrar
            </button>
        </a>

        <br><br>

        <a href="index.html" style="color: #2c3e50; font-weight: bold;">
            ← Voltar para a Página Inicial
        </a>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/cadastro-usuario.js"></script>

</body>

</html>
