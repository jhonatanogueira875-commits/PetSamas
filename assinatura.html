<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Assinatura Safe Samas</title>

    <link
        rel="stylesheet"
        href="css/style.css?v=1.1">

    <link
        rel="icon"
        type="image/png"
        href="assets/images/favicon.png">

</head>

<body>

    <main class="container">

        <img
            src="assets/images/escudo.png"
            alt="Safe Samas"
            id="logo"
            style="
                max-width:100px;
                display:block;
                margin:0 auto 20px auto;
            ">

        <h1>

            🛡️ Assinatura Safe Samas

        </h1>

        <p class="subtitulo">

            Para cadastrar novos pets ou objetos
            é necessário possuir uma assinatura ativa.

        </p>

        <br>

        <div class="card-samas">

            <h2>

                O que está incluso?

            </h2>

            <br>

            <p>

                ✔ Cadastros ilimitados

            </p>

            <p>

                ✔ QR Codes exclusivos

            </p>

            <p>

                ✔ Atualizações gratuitas

            </p>

            <p>

                ✔ Recuperação facilitada

            </p>

            <p>

                ✔ Validade de 1 ano

            </p>

        </div>

        <br>

        <h2>

            R$ 29,90

        </h2>

        <p>

            pagamento anual

        </p>

        <br>

        <button
            id="btnAssinar"
            class="btn-samas">

            💳 Assinar Agora

        </button>

        <br><br>

        <!-- Refinamento com replace para limpar o histórico e evitar loops -->
        <button
            onclick="window.location.replace('meus-pets.html')"
            class="btn-samas">

            ⬅ Voltar

        </button>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/supabase.js"></script>

    <script src="js/assinatura-pagamento.js"></script>

</body>

</html>
