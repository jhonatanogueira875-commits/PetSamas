<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Encontrei um item - Safe Samas</title>

    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

</head>

<body>

<main class="container">

    <!-- GALERIA -->
    <div id="galeriaFotos"></div>

    <!-- NOME -->
    <h1 id="nomePet">Carregando...</h1>

    <!-- STATUS -->
    <p id="statusPet">
        🔍 Buscando responsável ❤️
    </p>

    <!-- MENSAGEM -->
    <p id="mensagemPet">
        Se você encontrou este item, entre em contato com o responsável.
    </p>

    <br>

    <!-- RESPONSÁVEL -->
    <h3 id="labelTutor">
        👤 Responsável
    </h3>

    <p id="nomeTutor"></p>

    <br>

    <!-- CIDADE -->
    <h3>
        📍 Cidade
    </h3>

    <p id="cidadePet"></p>

    <br>

    <!-- BOTÃO -->
    <a id="linkWhatsapp" href="#" target="_blank">

        <button id="btnContato" class="btn-samas">
            💬 Falar com o responsável
        </button>

    </a>

    <br><br>

    <strong>
        ❤️ Muito obrigado por ajudar!
    </strong>

    <br><br>

    <p style="color:#777;font-size:14px;">
        Protegido por Safe Samas
    </p>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/pet-publico.js"></script>

</body>
</html>
