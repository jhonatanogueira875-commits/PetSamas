<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontrei um item - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="container">

        <!-- FOTO DO ITEM -->
        <img id="foto1" src="assets/images/logo.jpg" alt="Foto do Item">

        <!-- NOME -->
        <h1 id="nomePet">Carregando...</h1>

        <!-- STATUS -->
        <p id="statusPet">🔍 Este item pode estar perdido.</p>

        <br>

        <!-- MENSAGEM -->
        <p>Se você encontrou este item, entre em contato com o proprietário utilizando o botão abaixo.</p>

        <br>

        <!-- PROPRIETÁRIO -->
        <h3>👤 Proprietário</h3>
        <p id="nomeTutor"></p>

        <br>

        <!-- CIDADE -->
        <h3>📍 Cidade</h3>
        <p id="cidadePet"></p>

        <br>

        <!-- WHATSAPP -->
        <a id="linkWhatsapp" href="#" target="_blank">
            <button>💚 Falar com o Proprietário</button>
        </a>

        <br><br>

        <strong>❤️ Muito obrigado por ajudar a recuperar este item.</strong>

        <br><br>

        <p style="color:#777;font-size:14px;">Protegido por Safe Samas</p>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/pet-publico.js"></script>

</body>
</html>
