<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Safe Samas</title>
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>

<body>

    <main class="container">

        <!-- LOGO -->
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <!-- TÍTULO -->
        <h1>Entrar</h1>

        <p class="subtitulo">
            Acesse sua conta para gerenciar seus itens.
        </p>

        <!-- FORMULÁRIO -->
        <form id="formLogin">

            <!-- E-mail -->
            <label for="email">
                📧 E-mail
            </label>
            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                autocomplete="email"
                required>

            <!-- Senha -->
            <label for="senha">
                🔒 Senha
            </label>
            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                autocomplete="current-password"
                required>

            <br><br>

            <button type="submit" class="btn-samas">
                🔐 Entrar
            </button>

        </form>

        <!-- RECUPERAÇÃO DE SENHA -->
        <p style="margin-top:20px;">
            <a href="recuperar-senha.html" style="color: #2c3e50; font-weight: bold;">
                Esqueceu sua senha?
            </a>
        </p>

        <br>

        <p>
            Ainda não possui uma conta?
        </p>

        <br>

        <a href="cadastro-usuario.html">
            <button class="btn-samas">
                👤 Criar Conta
            </button>
        </a>

        <br><br>

        <a href="index.html" style="color: #2c3e50; font-weight: bold;">
            ← Voltar para a Página Inicial
        </a>

    </main>

    <!-- Biblioteca Oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Conexão com o Supabase -->
    <script src="js/supabase.js"></script>

    <!-- JavaScript da página -->
    <script src="js/login.js"></script>

</body>

</html>
