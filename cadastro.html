<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro do Pet - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <!-- ==================================================
             TÍTULO
        =================================================== -->

        <h1>Cadastro do Pet</h1>

        <p class="subtitulo">

            Preencha os dados abaixo para cadastrar seu pet.

        </p>

        <!-- ==================================================
             FORMULÁRIO
        =================================================== -->

        <form id="formCadastro">

            <!-- Nome do Pet -->

            <label for="nomePet">

                🐶 Nome do Pet

            </label>

            <input
                type="text"
                id="nomePet"
                required>

            <!-- Nome do Tutor -->

            <label for="nomeTutor">

                👤 Nome do Tutor

            </label>

            <input
                type="text"
                id="nomeTutor"
                required>

            <!-- Cidade -->

            <label for="cidade">

                📍 Cidade

            </label>

            <input
                type="text"
                id="cidade"
                required>

            <!-- WhatsApp -->

            <label for="telefone">

                📱 WhatsApp

            </label>

            <input
                type="tel"
                id="telefone"
                required>

            <!-- Foto -->

            <label for="foto">

                📷 Foto do Pet

            </label>

            <input
                type="file"
                id="foto"
                accept="image/*">

            <br><br>

            <button type="submit">

                💾 Cadastrar Pet

            </button>

        </form>

        <br>

        <a href="index.html">

            ← Voltar

        </a>

    </main>

    <!-- ==================================================
         Biblioteca Oficial do Supabase
    =================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ==================================================
         Conexão com o Supabase
    =================================================== -->

    <script src="js/supabase.js"></script>

    <!-- ==================================================
         JavaScript da página
    =================================================== -->

    <script src="js/cadastro.js"></script>

</body>

</html>
