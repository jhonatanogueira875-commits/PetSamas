<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro do Pet - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <main class="container">

        <h1>Cadastro do Pet</h1>

        <p class="subtitulo">

            Preencha os dados abaixo para cadastrar seu pet.

        </p>

        <!--
        ==================================================
        FORMULÁRIO
        Nesta Sprint ainda não salvamos os dados.
        Apenas simulamos um cadastro bem-sucedido.
        ==================================================
        -->

        <form action="cadastro-sucesso.html">

            <label for="nomePet">

                🐶 Nome do Pet

            </label>

            <input
                type="text"
                id="nomePet"
                required>

            <label for="nomeTutor">

                👤 Nome do Tutor

            </label>

            <input
                type="text"
                id="nomeTutor"
                required>

            <label for="cidade">

                📍 Cidade

            </label>

            <input
                type="text"
                id="cidade"
                required>

            <label for="telefone">

                📱 WhatsApp

            </label>

            <input
                type="tel"
                id="telefone"
                required>

            <label for="foto">

                📷 Foto do Pet

            </label>

            <input
                type="file"
                id="foto"
                accept="image/*">

            <br><br>

            <button type="submit">

                💾 Cadastrar Pet

            </button>

        </form>

        <br>

        <a href="index.html">

            ← Voltar

        </a>

    </main>

</body>

</html>
