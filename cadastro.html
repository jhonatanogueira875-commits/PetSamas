<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Criar Conta - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="assets/images/favicon.png">

</head>

<body>

    <main class="container">

        <!-- ==================================================
             LOGO
        =================================================== -->

        <img
            src="assets/images/logo.png"
            alt="Logo PetSamas"
            id="logo">

        <!-- ==================================================
             TÍTULO
        =================================================== -->

        <h1>Criar Conta</h1>

        <p class="subtitulo">

            Crie sua conta para começar a cadastrar seus pets.

        </p>

        <!-- ==================================================
             FORMULÁRIO
        =================================================== -->

        <form id="formCadastroUsuario">

            <label for="nome">

                👤 Nome

            </label>

            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
                required>

            <label for="email">

                📧 E-mail

            </label>

            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                required>

            <label for="senha">

                🔒 Senha

            </label>

            <input
                type="password"
                id="senha"
                placeholder="Crie uma senha"
                required>

            <label for="confirmarSenha">

                🔒 Confirmar Senha

            </label>

            <input
                type="password"
                id="confirmarSenha"
                placeholder="Digite novamente a senha"
                required>

            <br><br>

            <button type="submit">

                👤 Criar Conta

            </button>

        </form>

        <br>

        <p>

            Já possui uma conta?

        </p>

        <br>

        <a href="login.html">

            <button>

                🔐 Entrar

            </button>

        </a>

        <br><br>

        <a href="index.html">

            ← Voltar para a Página Inicial

        </a>

    </main>

    <!-- Biblioteca Oficial do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Conexão com o Supabase -->
    <script src="js/supabase.js"></script>

    <!-- JavaScript -->
    <script src="js/cadastro-usuario.js"></script>

</body>

</html>
