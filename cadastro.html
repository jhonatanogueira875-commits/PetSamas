<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Pet - PetSamas</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="icon" type="image/png" href="assets/images/favicon.png">

</head>

<body>

    <main class="container">

        <!-- ==================================================
             LOGO
        =================================================== -->

        <img
            src="assets/images/logo.png"
            alt="Logo PetSamas"
            id="logo">

        <!-- ==================================================
             TÍTULO
        =================================================== -->

        <h1 id="tituloPagina">

            🐾 Cadastrar Pet

        </h1>

        <p class="subtitulo">

            Preencha os dados do seu pet para gerar seu perfil.

        </p>

        <!-- ==================================================
             FORMULÁRIO
        =================================================== -->

        <form id="formCadastro">

            <!-- Nome do Pet -->

            <label for="nomePet">

                🐶 Nome do Pet

            </label>

            <input
                type="text"
                id="nomePet"
                placeholder="Digite o nome do pet"
                required>

            <!-- Tutor -->

            <label for="nomeTutor">

                👤 Nome do Tutor

            </label>

            <input
                type="text"
                id="nomeTutor"
                placeholder="Digite seu nome"
                required>

            <!-- Cidade -->

            <label for="cidade">

                📍 Cidade

            </label>

            <input
                type="text"
                id="cidade"
                placeholder="Digite sua cidade"
                required>

            <!-- Telefone -->

            <label for="telefone">

                📞 WhatsApp

            </label>

            <input
                type="tel"
                id="telefone"
                placeholder="Ex.: (42) 99999-9999"
                required>

            <!-- Foto -->

            <label for="foto">

                📷 Foto do Pet

            </label>

            <input
                type="file"
                id="foto"
                accept="image/*">

            <br><br>

            <button type="submit">

                💾 Salvar Pet

            </button>

        </form>

        <br>

        <a href="meus-pets.html">

            <button>

                🐾 Meus Pets

            </button>

        </a>

        <br><br>

        <a href="index.html">

            ← Voltar para a Página Inicial

        </a>

    </main>

    <!-- ==================================================
         Biblioteca Oficial do Supabase
    =================================================== -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- ==================================================
         Conexão com o Supabase
    =================================================== -->

    <script src="js/supabase.js"></script>

    <!-- ==================================================
         Proteção da Área Privada
    =================================================== -->

    <script src="js/auth.js"></script>

    <!-- ==================================================
         JavaScript da Página
    =================================================== -->

    <script src="js/cadastro.js"></script>

</body>

</html>
