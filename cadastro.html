<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar - Safe Samas</title>
    <!-- Adicionado versionamento de CSS -->
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

    <main class="container">
        <!-- LOGO ATUALIZADA -->
        <img src="assets/images/escudo.png" alt="Logo Safe Samas" id="logo" style="max-width: 100px; display: block; margin: 0 auto 15px auto;">

        <h1 id="tituloPagina">🐾/🔑 Cadastrar</h1>
        <p class="subtitulo">Preencha os dados do seu pet ou item para gerar seu perfil.</p>

        <form id="formCadastro">
            
            <label for="tipo">📦 O que você deseja proteger?</label>
            <select id="tipo" class="input-samas">
                <option value="pet">🐾 Pet</option>
                <option value="item">🔑 Item / Objeto</option>
            </select>

            <label for="nomePet">🐾/🔑 Nome do Pet ou Item</label>
            <input type="text" id="nomePet" placeholder="Digite o nome" required>

            <label for="nomeTutor">👤 Nome do Proprietário</label>
            <input type="text" id="nomeTutor" placeholder="Digite seu nome" required>

            <label for="cidade">📍 Cidade</label>
            <input type="text" id="cidade" placeholder="Digite sua cidade" required>

            <label for="telefone">📞 WhatsApp</label>
            <input type="tel" id="telefone" placeholder="Ex.: (42) 99999-9999" required>

            <label for="foto">📷 Foto Principal</label>
            <input type="file" id="foto" accept="image/*">

            <!-- Campos de fotos secundárias ocultos -->
            <!--
            <label for="foto2">📷 Foto 2 (Opcional)</label>
            <input type="file" id="foto2" accept="image/*">

            <label for="foto3">📷 Foto 3 (Opcional)</label>
            <input type="file" id="foto3" accept="image/*">
            -->

            <p style="font-size:13px; color:#666; margin-top:8px;">
                Utilize uma foto recente e bem iluminada para facilitar a identificação.
            </p>

            <div class="card-termos">
                <input type="checkbox" id="aceiteTermos" required>
                <label for="aceiteTermos">
                    Declaro estar ciente e aceito que a validade do QR Code é de <b>1 (um) ano</b> a partir da ativação. 
                    <a href="termos.html" target="_blank" style="color: #007bff; text-decoration: underline;">(Ver Termos)</a>
                </label>
            </div>

            <br>
            <!-- BOTÃO COM CLASSE btn-samas -->
            <button type="submit" class="btn-samas">💾 Salvar</button>
        </form>

        <br>
        <!-- BOTÕES COM CLASSE btn-samas -->
        <a href="meus-pets.html"><button class="btn-samas">🐾/🔑 Meus Cadastros</button></a>
        <br><br>
        <a href="index.html" style="color: #2c3e50; font-weight: bold;">← Voltar para a Página Inicial</a>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
