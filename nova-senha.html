<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Nova Senha - Safe Samas</title>

    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

</head>

<body>

<main class="container">

    <img
        src="assets/images/escudo.png"
        alt="Logo Safe Samas"
        id="logo"
        style="max-width:100px;display:block;margin:0 auto 15px auto;">

    <h1>🔑 Nova Senha</h1>

    <p class="subtitulo">
        Digite uma nova senha para concluir a recuperação da sua conta.
    </p>

    <form id="formNovaSenha">

        <label for="senha">
            🔒 Nova Senha
        </label>

        <input
            type="password"
            id="senha"
            placeholder="Digite sua nova senha"
            autocomplete="new-password"
            required>

        <label for="confirmarSenha">
            🔒 Confirmar Senha
        </label>

        <input
            type="password"
            id="confirmarSenha"
            placeholder="Confirme sua nova senha"
            autocomplete="new-password"
            required>

        <br><br>

        <button
            type="submit"
            class="btn-samas">

            💾 Salvar Nova Senha

        </button>

    </form>

    <br><br>

    <a href="login.html"
       style="color:#2c3e50;font-weight:bold;">

        ← Voltar para o Login

    </a>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/nova-senha.js"></script>

</body>
</html>
